apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: test-fe-deployment
spec:
  template:
    spec:
      imagePullSecrets:
        - name: pull-secret
      containers:
        - name: test-fe
          image: registry.gitlab.com/sittidet.jo/devops-assignment-test/prd:1.0.3
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "8080"

          ports:
            - name: http
              containerPort: 8080


          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5


---
apiVersion: v1
kind: Service
metadata:
  name: test-fe-service-stable
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30005
---
apiVersion: v1
kind: Service
metadata:
  name: test-fe-service-canary
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30105

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: test-fe-deployment
spec:
  analysis:
    successfulRunHistoryLimit: 1
    unsuccessfulRunHistoryLimit: 1
  strategy:
    canary:
      stableService: test-fe-service-stable
      canaryService: test-fe-service-canary
      steps:
        - setWeight: 25
        - pause: { duration: 15s }
        - analysis:
            templates:
              - templateName: test-fe-analysis-prometheus
            args:
              - name: url
                value: "http://test-fe-service-canary-prd:8080"
              - name: paths
                value: "GET|/"
              - name: configMapName
                value: "test-fe-smoke-test-config-prd"
              - name: timeout
                value: "10"
              - name: count
                value: "3"
              - name: smoke_interval
                value: "5s"
              - name: failure
                value: "1"
        - setWeight: 50
        - analysis:
            templates:
              - templateName: test-fe-analysis-prometheus
            args:
              - name: url
                value: "http://test-fe-service-canary-prd:8080"
              - name: paths
                value: "GET|/"
              - name: configMapName
                value: "test-fe-smoke-test-config-prd"
              - name: timeout
                value: "10"
              - name: count
                value: "3"
              - name: smoke_interval
                value: "5s"
              - name: failure
                value: "1"
        - pause: {}
        - setWeight: 100

