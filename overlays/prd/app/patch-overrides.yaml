apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: test-be-api-deployment
spec:
  template:
    spec:
      imagePullSecrets:
        - name: pull-secret
      containers:
        - name: test-be-api
          image: registry.gitlab.com/sittidet.jo/devops-assignment-test/prd:1.0.7

          ports:
            - name: http
              containerPort: 10104

          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml

          resources:
            requests:
              cpu: 350m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /health
              port: 10104
            failureThreshold: 20
            periodSeconds: 6
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 10104
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 10104
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5

      volumes:
        - name: config-volume
          secret:
            secretName: test-config-api

---
apiVersion: v1
kind: Service
metadata:
  name: test-be-api-service-stable
spec:
  ports:
    - name: http
      port: 10104
      targetPort: 10104
      nodePort: 30021
---
apiVersion: v1
kind: Service
metadata:
  name: test-be-api-service-canary
spec:
  ports:
    - name: http
      port: 10104
      targetPort: 10104
      nodePort: 30121

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: test-be-api-deployment
spec:
  analysis:
    successfulRunHistoryLimit: 1
    unsuccessfulRunHistoryLimit: 1
  strategy:
    canary:
      stableService: test-be-api-service-stable
      canaryService: test-be-api-service-canary
      steps:
        - setWeight: 25
        - pause: { duration: 15s }
        - analysis:
            templates:
              - templateName: test-be-api-analysis-newman
            args:
              - name: url
                value: "http://test-be-api-service-canary-prd:10104"
              - name: paths
                value: "/"
              - name: configMapName
                value: "test-be-api-smoke-test-config-prd"
              - name: secretName
                value: "test-api-secret"
              - name: timeout
                value: "10"
              - name: count
                value: "3"
              - name: smoke_interval
                value: "5s"
              - name: failure
                value: "1"
        - setWeight: 50
        - analysis:
            templates:
              - templateName: test-be-api-analysis-newman
            args:
              - name: url
                value: "http://test-be-api-service-canary-prd:10104"
              - name: paths
                value: "/"
              - name: configMapName
                value: "test-be-api-smoke-test-config-prd"
              - name: secretName
                value: "test-api-secret"
              - name: timeout
                value: "10"
              - name: count
                value: "3"
              - name: smoke_interval
                value: "5s"
              - name: failure
                value: "1"
        - pause: { duration: 15s }
        - setWeight: 100

